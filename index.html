<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Food Map 🍽️</title>

  <!-- Sora font -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body, #root {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'Sora', sans-serif;
      background: #0a0a14;
    }

    /* ---- Custom map pins ---- */
    .custom-pin { position: relative; }

    .pin-bubble {
      width: 44px;
      height: 44px;
      border-radius: 50% 50% 50% 0;
      transform: rotate(-45deg);
      background: linear-gradient(135deg, #1a1a2e, #16213e);
      border: 3px solid #ffffff;
      box-shadow: 0 3px 12px rgba(0,0,0,0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .pin-bubble:hover {
      transform: rotate(-45deg) scale(1.15);
      border-color: #FFD700;
      box-shadow: 0 4px 20px rgba(255,215,0,0.4);
    }

    .pin-bubble.pin-selected {
      width: 52px;
      height: 52px;
      background: linear-gradient(135deg, #E8472A, #FF6B47);
      border-color: #FFD700;
      box-shadow: 0 4px 20px rgba(232,71,42,0.6), 0 0 0 4px rgba(255,215,0,0.3);
    }

    .pin-emoji {
      transform: rotate(45deg);
      font-size: 18px;
      line-height: 1;
      display: block;
    }

    .pin-selected .pin-emoji {
      font-size: 22px;
    }

    /* Leaflet overrides */
    .leaflet-control-attribution {
      background: rgba(0,0,0,0.5) !important;
      color: rgba(255,255,255,0.4) !important;
      font-size: 10px !important;
    }
    .leaflet-control-attribution a { color: rgba(255,255,255,0.5) !important; }

    .leaflet-control-zoom a {
      background: rgba(15,15,30,0.9) !important;
      color: #fff !important;
      border-color: rgba(255,255,255,0.15) !important;
    }
    .leaflet-control-zoom a:hover {
      background: rgba(232,71,42,0.8) !important;
    }

    /* Scrollbar styling */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 2px; }
  </style>
  <script type="module" crossorigin src="/TasteTier/assets/index-Cz7s_J3V.js"></script>
</head>
<body>
  <div id="root"></div>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- React via ESM (Vite will handle this in the real project) -->
</body>
</html>
